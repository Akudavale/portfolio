<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0b1b3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="420" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M140 510 C 260 420, 340 420, 460 340"/>
    <path d="M460 340 C 580 260, 680 270, 820 210"/>
    <path d="M460 340 C 600 380, 720 430, 920 470"/>
    <path d="M820 210 C 930 250, 1010 310, 1080 390"/>
  </g>

  <g fill="#0f172a" stroke="#1f334e" stroke-width="2">
    <circle cx="140" cy="510" r="18"/>
    <circle cx="460" cy="340" r="18"/>
    <circle cx="820" cy="210" r="18"/>
    <circle cx="920" cy="470" r="18"/>
    <circle cx="1080" cy="390" r="18"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="80" y="150" fill="#e5e7eb" font-size="56" font-weight="700">CareerGraph</text>
    <text x="80" y="205" fill="#93c5fd" font-size="26" font-weight="600">AI-Powered Multi-Agent Career Intelligence</text>

    <g>
      <rect x="80" y="255" width="1040" height="1.5" fill="#1f2937" opacity="0.8"/>
    </g>

    <g fill="#e5e7eb" font-size="18" font-weight="600">
      <rect x="80" y="295" rx="14" ry="14" width="180" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="104" y="320">Agentic AI</text>

      <rect x="274" y="295" rx="14" ry="14" width="90" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="300" y="320">MCP</text>

      <rect x="378" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="402" y="320">FastAPI</text>

      <rect x="502" y="295" rx="14" ry="14" width="140" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="526" y="320">LangGraph</text>

      <rect x="656" y="295" rx="14" ry="14" width="140" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="680" y="320">PostgreSQL</text>

      <rect x="810" y="295" rx="14" ry="14" width="90" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="834" y="320">Redis</text>

      <rect x="914" y="295" rx="14" ry="14" width="206" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="938" y="320">LLM Guardrails</text>
    </g>

    <g fill="#cbd5e1" font-size="18" font-weight="500" opacity="0.9">
      <text x="80" y="410">Orchestrator–Worker pattern with specialized agents:</text>
      <text x="80" y="442">Resume optimization, skill gap analysis, interview prep, market trends</text>
      <text x="80" y="492">MCP tool-calling across external APIs and tools for parsing and retrieval</text>
      <text x="80" y="542">PostgreSQL + Redis state, guardrails for consistent multi-turn reasoning</text>
    </g>

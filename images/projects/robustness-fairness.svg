<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#3a1a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="30%" r="60%">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="410" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M160 500 C 280 380, 390 380, 510 280"/>
    <path d="M510 280 C 640 180, 780 190, 950 250"/>
    <path d="M510 280 C 670 340, 810 420, 1030 510"/>
  </g>

  <g fill="#0f172a" stroke="#1f334e" stroke-width="2">
    <circle cx="160" cy="500" r="18"/>
    <circle cx="510" cy="280" r="18"/>
    <circle cx="950" cy="250" r="18"/>
    <circle cx="1030" cy="510" r="18"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="80" y="150" fill="#e5e7eb" font-size="50" font-weight="700">Robustness + Fairness</text>
    <text x="80" y="205" fill="#fdba74" font-size="24" font-weight="600">Adversarial Training (PGD)</text>

    <rect x="80" y="255" width="1040" height="1.5" fill="#1f2937" opacity="0.8"/>

    <g fill="#e5e7eb" font-size="18" font-weight="600">
      <rect x="80" y="295" rx="14" ry="14" width="170" height="38" fill="url(#chip)" stroke="#7c2d12"/>
      <text x="104" y="320">Adversarial Training</text>

      <rect x="264" y="295" rx="14" ry="14" width="90" height="38" fill="url(#chip)" stroke="#7c2d12"/>
      <text x="290" y="320">PGD</text>

      <rect x="368" y="295" rx="14" ry="14" width="140" height="38" fill="url(#chip)" stroke="#7c2d12"/>
      <text x="392" y="320">CIFAR-10</text>

      <rect x="522" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#7c2d12"/>
      <text x="546" y="320">PyTorch</text>

      <rect x="646" y="295" rx="14" ry="14" width="160" height="38" fill="url(#chip)" stroke="#7c2d12"/>
      <text x="670" y="320">Computer Vision</text>
    </g>

    <g fill="#cbd5e1" font-size="18" font-weight="500" opacity="0.9">
      <text x="80" y="410">Studied misclassification distribution + batch sampling</text>
      <text x="80" y="450">Robust loss variants for targeted and untargeted attacks</text>
      <text x="80" y="510">Accuracy: 84% targeted, 76% untargeted</text>
    </g>
  </g>
</svg>

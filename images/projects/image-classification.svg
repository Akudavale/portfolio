<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#2a2034"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="30%" r="60%">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fbcfe8" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="410" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M170 500 C 280 410, 360 410, 470 330"/>
    <path d="M470 330 C 590 250, 720 250, 860 220"/>
    <path d="M470 330 C 630 380, 760 430, 940 500"/>
  </g>

  <g fill="#0f172a" stroke="#1f334e" stroke-width="2">
    <circle cx="170" cy="500" r="18"/>
    <circle cx="470" cy="330" r="18"/>
    <circle cx="860" cy="220" r="18"/>
    <circle cx="940" cy="500" r="18"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="80" y="150" fill="#e5e7eb" font-size="50" font-weight="700">Image Classification</text>
    <text x="80" y="205" fill="#f9a8d4" font-size="24" font-weight="600">Custom Dataset Challenge</text>

    <rect x="80" y="255" width="1040" height="1.5" fill="#1f2937" opacity="0.8"/>

    <g fill="#e5e7eb" font-size="18" font-weight="600">
      <rect x="80" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#7d1f55"/>
      <text x="104" y="320">PyTorch</text>

      <rect x="204" y="295" rx="14" ry="14" width="170" height="38" fill="url(#chip)" stroke="#7d1f55"/>
      <text x="228" y="320">EfficientNet</text>

      <rect x="388" y="295" rx="14" ry="14" width="170" height="38" fill="url(#chip)" stroke="#7d1f55"/>
      <text x="412" y="320">Computer Vision</text>

      <rect x="572" y="295" rx="14" ry="14" width="190" height="38" fill="url(#chip)" stroke="#7d1f55"/>
      <text x="596" y="320">Data Augmentation</text>

      <rect x="776" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#7d1f55"/>
      <text x="800" y="320">Docker</text>
    </g>

    <g fill="#cbd5e1" font-size="18" font-weight="500" opacity="0.9">
      <text x="80" y="410">Trained EfficientNet on 8-class dataset</text>
      <text x="80" y="450">Deployed as REST API with Docker</text>
      <text x="80" y="510">Accuracy: 98.0% train, 96.2% test</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#162a22"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="60%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a7f3d0" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="410" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M170 470 C 300 360, 390 360, 520 260"/>
    <path d="M520 260 C 650 160, 770 170, 940 220"/>
    <path d="M520 260 C 680 330, 820 410, 1000 500"/>
  </g>

  <g fill="#0f172a" stroke="#1f334e" stroke-width="2">
    <circle cx="170" cy="470" r="18"/>
    <circle cx="520" cy="260" r="18"/>
    <circle cx="940" cy="220" r="18"/>
    <circle cx="1000" cy="500" r="18"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="80" y="150" fill="#e5e7eb" font-size="50" font-weight="700">LLM Fine-Tuning</text>
    <text x="80" y="205" fill="#86efac" font-size="24" font-weight="600">Spam Classification</text>

    <rect x="80" y="255" width="1040" height="1.5" fill="#1f2937" opacity="0.8"/>

    <g fill="#e5e7eb" font-size="18" font-weight="600">
      <rect x="80" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#1b5a3f"/>
      <text x="104" y="320">PyTorch</text>

      <rect x="204" y="295" rx="14" ry="14" width="110" height="38" fill="url(#chip)" stroke="#1b5a3f"/>
      <text x="228" y="320">NLP</text>

      <rect x="328" y="295" rx="14" ry="14" width="150" height="38" fill="url(#chip)" stroke="#1b5a3f"/>
      <text x="352" y="320">Transformers</text>

      <rect x="492" y="295" rx="14" ry="14" width="170" height="38" fill="url(#chip)" stroke="#1b5a3f"/>
      <text x="516" y="320">Hugging Face</text>

      <rect x="676" y="295" rx="14" ry="14" width="140" height="38" fill="url(#chip)" stroke="#1b5a3f"/>
      <text x="700" y="320">Fine-Tuning</text>
    </g>

    <g fill="#cbd5e1" font-size="18" font-weight="500" opacity="0.9">
      <text x="80" y="410">Transformer-based fine-tuning for classification</text>
      <text x="80" y="450">4,000+ labeled examples</text>
      <text x="80" y="510">Training 97.21%, Test 95.67%</text>
    </g>
  </g>
</svg>

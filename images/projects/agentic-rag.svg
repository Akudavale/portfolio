<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0a2147"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="30%" r="60%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="410" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M150 475 C 260 415, 340 410, 460 320"/>
    <path d="M460 320 C 580 240, 690 250, 830 200"/>
    <path d="M460 320 C 610 360, 740 415, 930 460"/>
  </g>

  <g fill="#0f172a" stroke="#1f334e" stroke-width="2">
    <circle cx="150" cy="475" r="18"/>
    <circle cx="460" cy="320" r="18"/>
    <circle cx="830" cy="200" r="18"/>
    <circle cx="930" cy="460" r="18"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="80" y="150" fill="#e5e7eb" font-size="50" font-weight="700">Agentic RAG</text>
    <text x="80" y="205" fill="#93c5fd" font-size="24" font-weight="600">Research Paper Question Answering</text>

    <rect x="80" y="255" width="1040" height="1.5" fill="#1f2937" opacity="0.8"/>

    <g fill="#e5e7eb" font-size="18" font-weight="600">
      <rect x="80" y="295" rx="14" ry="14" width="250" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="104" y="320">Hugging Face Embeddings</text>

      <rect x="344" y="295" rx="14" ry="14" width="90" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="370" y="320">BM25</text>

      <rect x="448" y="295" rx="14" ry="14" width="130" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="472" y="320">ChromaDB</text>

      <rect x="592" y="295" rx="14" ry="14" width="130" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="616" y="320">LangChain</text>

      <rect x="736" y="295" rx="14" ry="14" width="130" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="760" y="320">LangGraph</text>

      <rect x="880" y="295" rx="14" ry="14" width="90" height="38" fill="url(#chip)" stroke="#274b78"/>
      <text x="906" y="320">RAGAS</text>
    </g>

    <g fill="#cbd5e1" font-size="18" font-weight="500" opacity="0.9">
      <text x="80" y="410">Hybrid retrieval + rank fusion for multi-PDF QA</text>
      <text x="80" y="450">Iterative planning, reranking, memory for reliability</text>
      <text x="80" y="510">RAGAS: 87.1% relevance, 81.3% faithfulness, 78.3% completeness</text>
    </g>
  </g>
</svg>
